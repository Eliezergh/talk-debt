name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  version-bump:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest version tag
        id: latest
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          VERSION="${LATEST_TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG (version: $VERSION)"

      - name: Bump version
        id: bump
        run: |
          CURRENT="${{ steps.latest.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ github.event.inputs.bump }}" in
            major)
              NEW_VERSION="$((MAJOR+1)).0.0"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR+1)).0"
              ;;
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH+1))"
              ;;
          esac

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping from $CURRENT to $NEW_VERSION"

  test:
    needs: [version-bump]
    if: always() && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check src tests

      - name: Check Ruff formatting
        run: ruff format --check src tests

      - name: Run tests (release gate)
        run: pytest tests/ -v --tb=short

  build:
    needs: [version-bump, test]
    if: always() && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) && needs.test.result == 'success'
    runs-on: macos-15
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve build metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ needs.version-bump.outputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "artifact_name=talk-debt-v$VERSION-macos" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-release-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies and build tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Stamp version into pyproject.toml
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

      - name: Build sdist and wheel
        run: python -m build

      - name: Build macOS app bundle
        run: |
          pyinstaller --noconfirm --windowed --name "Talk Debt" --paths src src/talk_debt/app.py

      - name: Create release archive
        run: |
          ARTIFACT="${{ steps.meta.outputs.artifact_name }}"
          mkdir -p dist_release
          cp -R "dist/Talk Debt.app" dist_release/
          cp dist/*.whl dist_release/ 2>/dev/null || true
          cp dist/*.tar.gz dist_release/ 2>/dev/null || true
          cp README.md dist_release/
          cd dist_release && zip -r "../${ARTIFACT}.zip" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.artifact_name }}.zip
          retention-days: 30

  release:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}

      - name: Finalize version bump and tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          git add pyproject.toml
          git commit -m "chore: bump version to v$VERSION"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin HEAD:main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: "Talk Debt v${{ needs.build.outputs.version }}"
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-beta') || contains(needs.build.outputs.version, '-alpha') || contains(needs.build.outputs.version, '-rc') }}
          generate_release_notes: true
          files: ${{ needs.build.outputs.artifact_name }}.zip
          body: |
            ## Talk Debt v${{ needs.build.outputs.version }}

            ### Installation
            1. Download `${{ needs.build.outputs.artifact_name }}.zip` and unzip it.
            2. Run `Talk Debt.app` on macOS.
            3. Or install the wheel with pip:
               ```
               pip install talk_debt-${{ needs.build.outputs.version }}-py3-none-any.whl
               ```
            4. Run with `python -m talk_debt.app` (requires Python 3.12+ and PySide6).
